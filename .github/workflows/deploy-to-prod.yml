name: Create PR to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "Automated deployment from main to prod"
          title: "Deploy: Sync main to production"
          body: "Automated deployment PR from main branch"
          branch: automated-deploy
          base: prod
